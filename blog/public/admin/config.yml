backend:
  name: github
  repo: PAVIEAdvocacia/PAVIE-091025
  branch: main
  base_url: https://blog.pavieadvocacia.com.br
  auth_endpoint: /api/auth

local_backend: true
publish_mode: simple
site_url: "https://blog.pavieadvocacia.com.br"
display_url: "https://blog.pavieadvocacia.com.br/blog/"
show_preview_links: true
locale: "pt"

media_folder: "blog/public/uploads"
public_folder: "/uploads"

collections:
  - name: "posts"
    label: "Posts Canonicos"
    label_singular: "Post"
    folder: "blog/src/content/blog"
    preview_path: "blog/{{slug}}"
    create: true
    delete: true
    identifier_field: "title"
    summary: "{{title}} - {{categoryCode}} - {{migrationStatus}}"
    slug: "{{slug}}"
    extension: "md"
    editor:
      preview: true
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
        hint: "Obrigatorio. Titulo principal do conteudo."
      - label: "SEO title"
        name: "seoTitle"
        widget: "string"
        required: true
        hint: "Obrigatorio. Titulo principal de SEO do contrato canonico."
      - label: "Descricao"
        name: "description"
        widget: "text"
        required: true
        hint: "Obrigatorio. Resumo principal do conteudo."
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: true
        hint: "Obrigatorio. Versao curta para listagens."
      - label: "Slug"
        name: "slug"
        widget: "string"
        required: true
        hint: "Obrigatorio. URL estavel sem prefixo /blog/."
      - label: "Legacy slug"
        name: "legacySlug"
        widget: "string"
        required: false
        hint: "Opcional. Use para compatibilidade com migracoes."
      - label: "Data de publicacao"
        name: "publishDate"
        widget: "datetime"
        required: true
      - label: "Data de atualizacao"
        name: "updatedAt"
        widget: "datetime"
        required: false
      - label: "Autor"
        name: "authorId"
        widget: "relation"
        collection: "authors"
        search_fields: ["name", "slug"]
        value_field: "id"
        display_fields: ["name", "id"]
        options_length: 10
        required: true
      - label: "Categoria canonica"
        name: "categoryCode"
        widget: "select"
        required: true
        options:
          - { label: "CAT-01 | Sucessoes, Inventarios e Partilha Patrimonial", value: "CAT-01" }
          - { label: "CAT-02 | Planejamento Patrimonial, Sucessorio e Arranjos Preventivos", value: "CAT-02" }
          - { label: "CAT-03 | Familia Patrimonial e Dissolucoes", value: "CAT-03" }
          - { label: "CAT-04 | Familia Binacional, Sucessoes Internacionais e Cooperacao Documental", value: "CAT-04" }
          - { label: "CAT-05 | Imoveis, Registro, Regularizacoes e Litigios Patrimoniais", value: "CAT-05" }
          - { label: "CAT-06 | Cobranca, Execucao, Contratos e Recuperacao de Credito Seletiva", value: "CAT-06" }
          - { label: "CAT-07 | Tributacao Patrimonial e Recuperacao Tributaria Seletiva", value: "CAT-07" }
      - label: "Tipo de conteudo"
        name: "contentType"
        widget: "select"
        required: true
        options:
          - "cornerstone"
          - "guide"
          - "spoke"
          - "faq"
          - "checklist"
          - "case-note"
          - "institutional"
      - label: "Estagio do leitor"
        name: "readerStage"
        widget: "select"
        required: true
        options:
          - "discover"
          - "clarify"
          - "compare"
          - "decide"
      - label: "Tipo de CTA"
        name: "ctaType"
        widget: "select"
        required: true
        options:
          - "area"
          - "contact"
          - "article-series"
          - "document-review"
      - label: "Destino do CTA"
        name: "ctaTarget"
        widget: "string"
        required: true
        hint: "Obrigatorio. URL ou destino estruturado do CTA."
      - label: "Rascunho"
        name: "draft"
        widget: "boolean"
        required: false
        default: true
      - label: "Noindex"
        name: "noindex"
        widget: "boolean"
        required: false
        default: true
      - label: "Destaque editorial"
        name: "featured"
        widget: "boolean"
        required: false
        default: false
      - label: "Revisao juridica"
        name: "legalReview"
        widget: "select"
        required: true
        default: "pending"
        options:
          - "pending"
          - "reviewed"
          - "needs-adjustment"
      - label: "Revisao editorial"
        name: "editorialReview"
        widget: "select"
        required: true
        default: "pending"
        options:
          - "pending"
          - "reviewed"
          - "needs-adjustment"
      - label: "Status de migracao"
        name: "migrationStatus"
        widget: "select"
        required: true
        default: "native"
        options:
          - "native"
          - "migrated"
          - "revised"
          - "archived"
          - "redirected"
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
      - label: "Keywords"
        name: "keywords"
        widget: "list"
        required: false
      - label: "Areas relacionadas"
        name: "relatedAreas"
        widget: "relation"
        collection: "areas"
        search_fields: ["title", "slug", "categoryCode"]
        value_field: "slug"
        display_fields: ["title"]
        multiple: true
        required: false
      - label: "Posts relacionados"
        name: "relatedPosts"
        widget: "relation"
        collection: "posts"
        search_fields: ["title", "slug", "categoryCode"]
        value_field: "slug"
        display_fields: ["title"]
        multiple: true
        required: false
      - label: "Canonical URL"
        name: "canonicalUrl"
        widget: "string"
        required: false
      - label: "Schema type"
        name: "schemaType"
        widget: "select"
        required: false
        options:
          - "Article"
          - "BlogPosting"
      - label: "Imagem de capa"
        name: "coverImage"
        widget: "image"
        required: false
      - label: "Alt da imagem"
        name: "coverImageAlt"
        widget: "string"
        required: false
      - label: "Conteudo"
        name: "body"
        widget: "markdown"
        hint: "Corpo principal do post. Revisao humana obrigatoria para copy sensivel."

  - name: "areas"
    label: "Areas Canonicas"
    label_singular: "Area"
    folder: "blog/src/content/areas"
    preview_path: "areas/{{slug}}"
    create: true
    delete: false
    identifier_field: "title"
    summary: "{{title}} - {{categoryCode}}"
    slug: "{{slug}}"
    extension: "md"
    editor:
      preview: true
    fields:
      - label: "Titulo"
        name: "title"
        widget: "string"
        required: true
      - label: "Slug"
        name: "slug"
        widget: "string"
        required: true
      - label: "Categoria canonica"
        name: "categoryCode"
        widget: "select"
        required: true
        options:
          - { label: "CAT-01", value: "CAT-01" }
          - { label: "CAT-02", value: "CAT-02" }
          - { label: "CAT-03", value: "CAT-03" }
          - { label: "CAT-04", value: "CAT-04" }
          - { label: "CAT-05", value: "CAT-05" }
          - { label: "CAT-06", value: "CAT-06" }
          - { label: "CAT-07", value: "CAT-07" }
      - label: "Descricao curta"
        name: "shortDescription"
        widget: "text"
        required: true
      - label: "Headline"
        name: "headline"
        widget: "string"
        required: true
      - label: "Tipo de CTA"
        name: "ctaType"
        widget: "select"
        required: true
        options:
          - "area"
          - "contact"
          - "article-series"
          - "document-review"
      - label: "Destino do CTA"
        name: "ctaTarget"
        widget: "string"
        required: true
      - label: "SEO title"
        name: "seoTitle"
        widget: "string"
        required: true
      - label: "Descricao"
        name: "description"
        widget: "text"
        required: true
      - label: "Ordem"
        name: "order"
        widget: "number"
        value_type: "int"
        min: 1
        required: true
      - label: "Ativa"
        name: "isActive"
        widget: "boolean"
        required: false
        default: true
      - label: "Status de revisao"
        name: "reviewStatus"
        widget: "select"
        required: true
        default: "pending"
        options:
          - "pending"
          - "reviewed"
          - "needs-adjustment"
      - label: "Conteudo"
        name: "body"
        widget: "markdown"
        required: false

  - name: "authors"
    label: "Autores"
    label_singular: "Autor"
    folder: "blog/src/content/authors"
    preview_path: "autor/{{slug}}"
    create: true
    delete: false
    identifier_field: "name"
    summary: "{{name}} - {{id}}"
    slug: "{{slug}}"
    extension: "md"
    editor:
      preview: true
    fields:
      - label: "ID"
        name: "id"
        widget: "select"
        required: true
        options:
          - { label: "fabio-pavie", value: "fabio-pavie" }
      - label: "Nome"
        name: "name"
        widget: "string"
        required: true
      - label: "Slug"
        name: "slug"
        widget: "string"
        required: true
      - label: "Bio curta"
        name: "shortBio"
        widget: "text"
        required: true
      - label: "Bio estendida"
        name: "extendedBio"
        widget: "text"
        required: true
      - label: "OAB"
        name: "oab"
        widget: "string"
        required: true
      - label: "Imagem"
        name: "image"
        widget: "image"
        required: true
      - label: "Alt da imagem"
        name: "imageAlt"
        widget: "string"
        required: true
      - label: "Status de revisao"
        name: "reviewStatus"
        widget: "select"
        required: true
        default: "pending"
        options:
          - "pending"
          - "reviewed"
          - "needs-adjustment"
      - label: "Conteudo"
        name: "body"
        widget: "markdown"
        required: false
