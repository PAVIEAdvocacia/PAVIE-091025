backend:
  name: github
  repo: PAVIEAdvocacia/PAVIE-091025
  branch: main

local_backend: true
publish_mode: simple
site_url: "https://pavieadvocacia.com.br"
locale: "pt"

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "areas"
    label: "Areas Juridicas"
    label_singular: "Area"
    folder: "src/content/taxonomy/areas"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    summary: "{{title}}"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Descricao", name: "description", widget: "text", required: false }
      - { label: "Ordem", name: "order", widget: "number", value_type: "int", required: false }
      - { label: "Ativa", name: "active", widget: "boolean", default: true, required: false }
      - { label: "Conteudo", name: "body", widget: "markdown", required: false }

  - name: "hubs"
    label: "Hubs"
    label_singular: "Hub"
    folder: "src/content/taxonomy/hubs"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    summary: "{{title}} ({{area}})"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      -
          label: "Area Juridica"
          name: "area"
          widget: "relation"
          collection: "areas"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
      - { label: "Descricao", name: "description", widget: "text", required: false }
      - { label: "Ordem", name: "order", widget: "number", value_type: "int", required: false }
      - { label: "Ativo", name: "active", widget: "boolean", default: true, required: false }
      - { label: "Conteudo", name: "body", widget: "markdown", required: false }

  - name: "themes"
    label: "Temas"
    label_singular: "Tema"
    folder: "src/content/taxonomy/themes"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    summary: "{{title}} ({{area}}/{{hub}})"
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      -
          label: "Area Juridica"
          name: "area"
          widget: "relation"
          collection: "areas"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
      -
          label: "Hub"
          name: "hub"
          widget: "relation"
          collection: "hubs"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
      - { label: "Descricao", name: "description", widget: "text", required: false }
      - { label: "Ativo", name: "active", widget: "boolean", default: true, required: false }
      - { label: "Conteudo", name: "body", widget: "markdown", required: false }

  - name: "authors"
    label: "Autores"
    label_singular: "Autor"
    folder: "src/content/authors"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    summary: "{{name}}"
    fields:
      - { label: "Nome", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "OAB", name: "oab", widget: "string", required: false }
      - { label: "Cargo", name: "role", widget: "string", required: false }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Imagem", name: "image", widget: "image", required: false }
      -
          label: "Areas de atuacao"
          name: "areas"
          widget: "relation"
          collection: "areas"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
          multiple: true
          required: false
      - { label: "Anos de experiencia", name: "experience_years", widget: "number", value_type: "int", required: false }
      - { label: "Conteudo", name: "body", widget: "markdown", required: false }

  - name: "blog"
    label: "Publicacoes do Blog"
    label_singular: "Publicacao"
    folder: "src/content/blog"
    create: true
    delete: true
    identifier_field: "title"
    summary: "{{title}} - {{publish_status}}"
    slug: "{{slug}}"
    extension: "md"
    editor:
      preview: true
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      -
          label: "Slug canonico"
          name: "slug"
          widget: "string"
          required: true
          hint: "URL amigavel. Ex.: inventario-extrajudicial-2026"
      - { label: "Descricao", name: "description", widget: "text", required: true }
      - { label: "Resumo", name: "excerpt", widget: "text", required: false }
      -
          label: "Area Juridica"
          name: "area"
          widget: "relation"
          collection: "areas"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
      -
          label: "Hub"
          name: "hub"
          widget: "relation"
          collection: "hubs"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
      -
          label: "Temas"
          name: "tema"
          widget: "relation"
          collection: "themes"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
          multiple: true
      -
          label: "Autor"
          name: "author_ref"
          widget: "relation"
          collection: "authors"
          search_fields: ["name", "slug"]
          value_field: "slug"
          display_fields: ["name"]
      - { label: "Nome do autor (override)", name: "author_name", widget: "string", required: false }
      -
          label: "Tipo de conteudo"
          name: "content_type"
          widget: "select"
          required: true
          options:
            - "guia"
            - "explicativo"
            - "checklist"
            - "comparativo"
            - "faq"
            - "atualizacao"
            - "caso_pratico"
            - "alerta"
            - "glossario"
            - "pagina_pilar"
      -
          label: "Intencao"
          name: "intent"
          widget: "select"
          required: true
          options: ["informar", "diagnosticar", "comparar", "aprofundar", "converter", "atualizar"]
      -
          label: "Estagio do funil"
          name: "funnel_stage"
          widget: "select"
          required: true
          options: ["topo", "meio", "fundo"]
      - { label: "Publicado em", name: "published_at", widget: "datetime", required: true }
      - { label: "Atualizado em", name: "updated_at", widget: "datetime", required: false }
      - { label: "Imagem de capa", name: "featured_image", widget: "image", required: false }
      - { label: "Texto alternativo da imagem", name: "featured_image_alt", widget: "string", required: false }
      - { label: "Tempo de leitura (min)", name: "reading_time", widget: "number", required: false, value_type: "int", min: 1 }
      -
          label: "FAQ estruturado"
          name: "faq_items"
          widget: "list"
          required: false
          summary: "{{fields.question}}"
          fields:
            - { label: "Pergunta", name: "question", widget: "string" }
            - { label: "Resposta", name: "answer", widget: "text" }
      - { label: "FAQ habilitado", name: "faq_enabled", widget: "boolean", required: false, default: false }
      -
          label: "Variante de CTA"
          name: "cta_variant"
          widget: "select"
          required: false
          default: "consultoria"
          options: ["consultoria", "checklist", "leitura_relacionada", "calculadora", "contato", "diagnostico"]
      -
          label: "Relacionados"
          name: "related_manual"
          widget: "relation"
          collection: "blog"
          search_fields: ["title", "slug"]
          value_field: "slug"
          display_fields: ["title"]
          multiple: true
          required: false
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      -
          label: "Status de publicacao"
          name: "publish_status"
          widget: "select"
          required: true
          default: "draft"
          options: ["draft", "review", "scheduled", "published", "archived"]
      - { label: "Canonical URL", name: "canonical_url", widget: "string", required: false }
      - { label: "Escopo de jurisdicao", name: "jurisdiction_scope", widget: "string", required: false }
      - { label: "Conteudo", name: "body", widget: "markdown" }
      - { label: "ID interno (opcional)", name: "editorial_item_id", widget: "string", required: false }
      - { label: "Referencia interna (opcional)", name: "trace_ref", widget: "string", required: false }
